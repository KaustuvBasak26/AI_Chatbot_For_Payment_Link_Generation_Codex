services:
  backend:
    build: ./backend
    environment:
      DATABASE_URL: sqlite:////data/paylink.db
      FRONTEND_ORIGIN: http://localhost:5173
      MOCK_PAYMENT_BASE_URL: http://localhost:5173/pay/mock
    ports: ["8000:8000"]
    volumes: ["paylink-data:/data"]
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports: ["5173:80"]
    depends_on: [backend]
volumes:
  paylink-data:

